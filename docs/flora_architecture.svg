<svg width="680" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: transparent;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Frontend -->
  <rect x="240" y="20" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="43" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Frontend</text>
  <text x="340" y="62" text-anchor="middle" font-size="12" fill="#5F5E5A">React · Vite · Vercel</text>

  <!-- Arrow: Frontend → Backend -->
  <line x1="340" y1="76" x2="340" y2="124" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="348" y="107" font-size="11" fill="#888780">image + message</text>

  <!-- FastAPI Backend -->
  <rect x="240" y="126" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="149" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">FastAPI backend</text>
  <text x="340" y="168" text-anchor="middle" font-size="12" fill="#185FA5">Railway · Python 3.13</text>

  <!-- Arrow: Backend → Agent -->
  <line x1="340" y1="182" x2="340" y2="230" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Agent Orchestrator -->
  <rect x="220" y="232" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="255" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Agent orchestrator</text>
  <text x="340" y="274" text-anchor="middle" font-size="12" fill="#0F6E56">gpt-4o · function calling</text>

  <!-- Tool fan arrows -->
  <path d="M 340 288 L 340 318 L 124 318 L 124 346" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 340 288 L 268 346" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 340 288 L 412 346" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 340 288 L 340 318 L 556 318 L 556 346" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- vision_analyze -->
  <rect x="59" y="348" width="130" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="124" y="371" text-anchor="middle" font-size="13" font-weight="500" fill="#27500A">vision_analyze</text>
  <text x="124" y="389" text-anchor="middle" font-size="11" fill="#3B6D11">GPT-4V diagnosis</text>

  <!-- rag_lookup -->
  <rect x="203" y="348" width="130" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="268" y="371" text-anchor="middle" font-size="13" font-weight="500" fill="#27500A">rag_lookup</text>
  <text x="268" y="389" text-anchor="middle" font-size="11" fill="#3B6D11">FAISS · 15 docs</text>

  <!-- severity_assess -->
  <rect x="347" y="348" width="130" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="412" y="371" text-anchor="middle" font-size="13" font-weight="500" fill="#27500A">severity_assess</text>
  <text x="412" y="389" text-anchor="middle" font-size="11" fill="#3B6D11">rule-based scoring</text>

  <!-- escalate -->
  <rect x="491" y="348" width="130" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="556" y="371" text-anchor="middle" font-size="13" font-weight="500" fill="#27500A">escalate</text>
  <text x="556" y="389" text-anchor="middle" font-size="11" fill="#3B6D11">human review</text>

  <!-- Supervisor bypass arrow (agent → supervisor, right side) -->
  <path d="M 460 260 L 632 260 L 632 486 L 462 486" fill="none" stroke="#7F77DD" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-purple)"/>
  <text x="648" y="378" text-anchor="middle" font-size="11" fill="#7F77DD" transform="rotate(90 648 378)">LLM-as-judge</text>

  <!-- Tool convergence arrows to supervisor -->
  <path d="M 124 404 L 124 440 L 338 440 L 338 457" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 268 404 L 268 440 L 338 440" fill="none" stroke="#888" stroke-width="0.7"/>
  <path d="M 412 404 L 412 440 L 342 440" fill="none" stroke="#888" stroke-width="0.7"/>
  <path d="M 556 404 L 556 440 L 344 440" fill="none" stroke="#888" stroke-width="0.7"/>

  <!-- Supervisor -->
  <rect x="220" y="458" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="481" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Supervisor (LLM-as-judge)</text>
  <text x="340" y="500" text-anchor="middle" font-size="12" fill="#534AB7">catches 65% overconfident responses</text>

  <!-- Arrow: Supervisor → response -->
  <line x1="340" y1="514" x2="340" y2="538" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="340" y="552" text-anchor="middle" font-size="12" fill="#5F5E5A">response to user</text>
</svg>
